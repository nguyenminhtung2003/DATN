<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập — WebQuanLi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">🚗</div>
                <h1>WebQuanLi</h1>
                <p class="login-subtitle">Hệ Thống Cảnh Báo Buồn Ngủ Trên Xe Ô Tô</p>
            </div>

            {% if error %}
            <div class="login-error">
                <span>⚠️</span> {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/login" class="login-form">
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
                </div>
                <button type="submit" class="btn btn-primary btn-login" id="btn-login">Đăng Nhập</button>
            </form>

            <div class="login-footer">
                <p>Drowsiness Detection System v1.0</p>
            </div>
        </div>
    </div>
</body>
</html>
